opts:
  dir_paths: []
  txt_file_path: []
  im_exts: ['png', 'jpg', 'JPEG']

  io_backend:
    type: disk

  blur_kernel_size: 13
  kernel_list: ['iso', 'aniso', 'generalized_iso', 'generalized_aniso', 'plateau_iso', 'plateau_aniso']
  kernel_prob: [0.60, 0.40, 0.0, 0.0, 0.0, 0.0]
  sinc_prob: 0.1
  blur_sigma: [0.2, 2.0]
  betag_range: [1.0, 1.5]
  betap_range: [1, 1.2]

  blur_kernel_size2: 7
  kernel_list2: ['iso', 'aniso', 'generalized_iso', 'generalized_aniso', 'plateau_iso', 'plateau_aniso']
  kernel_prob2: [0.60, 0.40, 0.0, 0.0, 0.0, 0.0]
  sinc_prob2: 0.1
  blur_sigma2: [0.2, 1.0]
  betag_range2: [1.0, 1.5]
  betap_range2: [1, 1.2]

  final_sinc_prob: 0.8

  gt_size: 256
  crop_pad_size: 300
  use_hflip: False
  use_rot: False
  rescale_gt: True

degradation:
  sf: 4

  resize_prob: [0.2, 0.7, 0.1]
  resize_range: [0.15, 1.5]

  gaussian_noise_prob: 0.5
  noise_range: [1, 25]

  poisson_scale_range: [0.05, 0.5]

  gray_noise_prob: 0.4

  jpeg_range: [50, 95]

  second_order_prob: 0.5
  second_blur_prob: 0.8

  resize_prob2: [0.3, 0.4, 0.3]
  resize_range2: [0.3, 1.2]

  gaussian_noise_prob2: 0.5
  noise_range2: [1, 20]

  poisson_scale_range2: [0.05, 0.4]

  gray_noise_prob2: 0.4

  jpeg_range2: [50, 95]

  gt_size: 256
  resize_back: False
  use_sharp: False
